# theme
include ./gruvbox-material-kitty/colors/gruvbox-material-dark-hard.conf
linux_display_server auto

# font
font_family      JetBrainsMono Nerd Font Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size	 13.0

# window
window_padding_width 5

# other
editor 	nvim
shell   fish

env SHELL=/usr/local/bin/fish
env EDITOR=/usr/local/bin/nvim

macos_option_as_alt left

map ctrl+tab next_tab
map ctrl+shift+tab previous_tab

map ctrl+right next_tab
map ctrl+left previous_tab

# new tabs inherit the cwd of the currently focused window (ghostty-like)
map ctrl+shift+t new_tab_with_cwd

# send literal ESC+CR for shift+enter (Claude Code treats this as
# "insert newline" instead of submit) - sidesteps the kitty-keyboard-
# protocol/CSI-u handshake, which doesn't reliably traverse tmux
map shift+enter send_text all \x1b\r

enable_audio_bell
